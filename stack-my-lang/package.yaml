name:                my-lang
version:             0.1.0.0
license:             MIT
author:              "My Name"
maintainer:          "my@address.here"
copyright:           "2026 Author name here"

extra-source-files:
- README.md

description:         Implementation of MyLang.

dependencies:
- base >= 4.18 && < 5
- aeson >= 2.2 && < 2.3
- bytestring >= 0.12 && < 0.13
- parsec >= 3.1 && < 3.2
- QuickCheck >= 2.15 && < 2.19
- scientific >= 0.3 && < 0.4
- sprockell >= 2022.0
- hspec >= 2.11 && < 2.12
- text >= 2.0 && < 2.2
- vector >= 0.13 && < 0.14
- hashmap

library:
  source-dirs: src

executables:
  my-lang-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - my-lang

